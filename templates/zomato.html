<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Header */
        header {
            background-color: #e23744;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Section */
        .food-section {
            padding: 30px;
        }

        .veg-title {
            color: green;
        }

        .nonveg-title {
            color: red;
        }

        /* Food Cards */
        .food-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .food-card {
            background-color: white;
            width: 220px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .food-card img {
            width: 100%;
            border-radius: 10px;
        }

        .food-card h3 {
            margin: 10px 0;
        }

        .food-card button {
            background-color: #e23744;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        .food-card button:hover {
            background-color: #c62828;
        }
    </style>
</head>
